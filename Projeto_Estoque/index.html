<!doctype html>
<html lang="pt-br">
	<head>
		<meta charset="utf-8" />
		<title>Construindo uma página HTML</title>

		<style>
			body{
				background-color: #eec591;
				font-family: Arial, Helvetica, sans-serif;
			}
			p{
				color: #777;
			}
			#primeiro{
				color: #333;
				font-weight: 600;
			}
		</style>

	</head>

	<body>
		<h1 >Construindo uma página HTML</h1>
		<!-- para podermos comentar o codigo no HTML -->
		<p id="primeiro">As formatações no HTML são feitas através da CSS</p>
		<p>A tag "p" faz a quebra do parágrafo.</p>
		<p>Aqui temos um exemplo de quebra <br />
			de linha no mesmo parágrafo.</p> 
			

	</body>

</html>
